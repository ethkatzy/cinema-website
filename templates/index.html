<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Main Page</title>
    <link rel="icon" type="image/x-icon" href="https://svgsilh.com/svg/2027080.svg">
    <link rel="stylesheet" href="{{ url_for('static', filename='index.css') }}">
</head>
<body>
{% set nav_button_class = "button" %}
{% include "_banner.html" %}
<h1>Films showing today:</h1>
<h1></h1>
{% for item in items %}
<div class="film-box">
    <a href="/film/{{item[1]|slugify}}">
        <img src={{item[5]}} alt={{item[1]}} class="poster">
    </a>
    <div class="film-box-content">
        <div class="title-image">
            <a href="/film/{{item[1]|slugify}}">
                <h3>{{item[1]}}</h3>
            </a>
            <img src="{{item[3]}}" alt="{{item[4]}} ">
        </div>
        <p>{{item[2]}}</p>
        <div class="showings">
            {% for showing in showings %}
            {% if showing.filmid == item[0] %}
            <a href="/showing/{{showing.datetime[:10]}}/{{showing.datetime[11:]}}/screen-{{showing.screenid}}" class="showing-button">
                Screen {{showing.screenid}} - {{showing.datetime[-5:]}}
            </a>
            {% endif %}
            {% endfor %}
        </div>
    </div>
</div>
{% endfor %}
</body>
</html>
