<html lang="en">
<head>
    <title>Create an account</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='login.css') }}">
    <link rel="icon" type="image/x-icon" href="https://svgsilh.com/svg/2027080.svg">
</head>
<body>
{% include "_banner.html" %}

<div class="login-box">
    <div class="button">
        <a href="/login">
            Already got an account? Log in here
        </a>
    </div>

    {%if message%}
    <p style="color: red">
        {{message}}
    </p>
    {% endif %}
<form action="/create" method="post">
    <p>
        Full name: <br />
        <label>
            <input type="text" name="username" required/>
        </label>
    </p>
    <p>
        Email: <br />
        <label>
            <input type="email" name="email" required />
        </label>
    </p>
    <p>
        Phone number: <br />
        <label>
            <input type="tel" name="phone_number" pattern="\+?[0-9]{7,15}" title="7-15 digits, optionally starting with +" required />
        </label>
    </p>
    <p>
    Password: <br />
        <label>
            <input type="password" name="password_1" minlength="8" pattern="(?=.*[A-Za-z])(?=.*\d).{8,}" title="At least 8 characters, including a letter and a number" required />
        </label>
    </p>
    <p>
        Re-enter password: <br />
        <label>
            <input type="password" name="password_2" required />
        </label>
    </p>
    <p><br></p>
    <input type="submit" value="Create account" />
    <input type="hidden" value="{{session.csrf_token}}" name="csrf_token"/>
</form>
</div>
</body>
</html>
